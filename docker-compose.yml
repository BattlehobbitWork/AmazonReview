services:
  backend:
    build: ./backend
    container_name: cbmih-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    environment:
      - DATA_DIR=/app/data

  frontend:
    build: ./frontend
    container_name: cbmih-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  app-data:
